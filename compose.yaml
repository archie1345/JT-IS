# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  server:
    build:
      context: .
    container_name: jte-server
    ports:
      - "9000:80"
      # - "5173:5173"
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD_FILE=/run/secrets/db-password
    command: >
      sh -c "
      composer install --no-interaction --prefer-dist &&
      php artisan migrate --force &&
      chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache &&
      chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache &&
      apache2-foreground
      "

  vite:
    image: node:20-alpine # Much faster, no need to build a Dockerfile!
    container_name: jte-vite
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules # Protects container's node_modules
    # The --host flag is CRITICAL for Vite inside Docker
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      # Helps Vite watch for file changes on Windows/WSL systems
      - CHOKIDAR_USEPOLLING=true
  db:
    image: mysql:8.0
    restart: always
    container_name: jte-db
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=laravel
      - MYSQL_USER=laravel
      - MYSQL_PASSWORD_FILE=/run/secrets/db-password
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db-password
    expose:
      - 3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    container_name: jte-phpmyadmin
    ports:
      - "9468:80"
    depends_on:
      - db
    environment:
      - PMA_HOST=db
      - PMA_USER=laravel
      - PMA_PASSWORD_FILE=/run/secrets/db-password
      - PMA_ROOT_PASSWORD_FILE=/run/secrets/db-password
    secrets:
      - db-password

volumes:
  db-data:

secrets:
  db-password:
    file: db/password.txt

